<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configurações básicas da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML-UPF</title>
</head>
<body>
    <header>
        <h1>Prática com imagens</h1>
        <p>Exemplos simples de uso da tag &lt;img&gt;.</p>
    </header>

    <!-- Menu para voltar às páginas principais -->
    <nav>
        <a href="index.html">Início</a> |
        <a href="sobre.html">Sobre</a> |
        <a href="aulas.html">Aulas</a> |
        <a href="contato.html">Contato</a>
    </nav>

    <hr>

    <main>
        <h2>Imagem com endereço da internet</h2>

        <!--
            src = caminho da imagem
            alt = texto alternativo (importante para acessibilidade)
            width = largura da imagem
        -->        
            <img
                src="https://agenciamarcospontes.com.br/wp-content/uploads/2020/03/turismo-aurora-boreal.jpg" 
                alt="Logo do HTML5"
                width="500"
            >
        <a href="https://pt.wikipedia.org/wiki/Lobo" target="_blank">
        <img
              src="imagens/lobo.avif"
              alt="lobo"
              width="300"
              >
        </a>
        <p>
            Dica: você também pode usar imagens locais, por exemplo:
            <code>src="imagens/foto.jpg"</code>
        </p>

        <h2>Legenda da imagem</h2>

        <!-- figure agrupa imagem + legenda -->
        <figure>
            <img
                src="https://i.pinimg.com/1200x/66/fa/ad/66faad8a6eb8fd92502750d532efef25.jpg"
                alt="Símbolo do HTML"
                width="160"
            >
            <figcaption>Exemplo usando &lt;figure&gt; e &lt;figcaption&gt;.</figcaption>
        </figure>
    </main>

    <hr>

    <footer>
        <p>UPF - 2026</p>
    </footer>
</body>
</html>
